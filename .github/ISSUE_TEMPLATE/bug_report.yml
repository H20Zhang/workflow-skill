name: Bug report
description: Report a reproducible defect.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the spec, command, or code needed to reproduce the issue.
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.2"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Error output
      description: Paste the exact error or traceback.
